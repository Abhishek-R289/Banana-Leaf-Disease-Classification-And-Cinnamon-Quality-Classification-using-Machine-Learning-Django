<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
        }

        .card {
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
        }

        .btn-custom {
            background: linear-gradient(to right, #11998e, #38ef7d);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card w-100" style="max-width: 420px;">

        <h3 class="text-center mb-4">📝 Create Account</h3>

        {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>

            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

            <!-- PASSWORD -->
            <div class="position-relative mb-2">
                <input type="password" id="pass1" name="password1" class="form-control" placeholder="Password" required>
                <span onclick="togglePass1()" style="position:absolute; right:10px; top:10px; cursor:pointer;">👁️</span>
            </div>
            <small id="strengthMsg"></small>

            <!-- CONFIRM PASSWORD -->
            <div class="position-relative mb-2">
                <input type="password" id="pass2" name="password2" class="form-control" placeholder="Confirm Password" required>
                <span onclick="togglePass2()" style="position:absolute; right:10px; top:10px; cursor:pointer;">👁️</span>
            </div>
            <small id="matchMsg"></small>

            <button type="submit" class="btn btn-custom w-100 mt-3">🚀 Create Account</button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="/login/">Login</a>
        </p>

    </div>
</div>

<script>
function togglePass1() {
    const p = document.getElementById("pass1");
    p.type = p.type === "password" ? "text" : "password";
}

function togglePass2() {
    const p = document.getElementById("pass2");
    p.type = p.type === "password" ? "text" : "password";
}

const password = document.getElementById("pass1");
const confirmPassword = document.getElementById("pass2");

password.addEventListener("input", () => {
    const val = password.value;
    let msg = "";

    if (val.length < 6) {
        msg = "Weak ❌";
        strengthMsg.style.color = "red";
    } else if (val.match(/[A-Z]/) && val.match(/[0-9]/) && val.length >= 8) {
        msg = "Strong 💪";
        strengthMsg.style.color = "green";
    } else {
        msg = "Medium ⚠️";
        strengthMsg.style.color = "orange";
    }

    strengthMsg.textContent = "Password Strength: " + msg;
});

confirmPassword.addEventListener("input", () => {
    if (password.value === confirmPassword.value) {
        matchMsg.textContent = "✔ Passwords match";
        matchMsg.style.color = "green";
    } else {
        matchMsg.textContent = "❌ Passwords do not match";
        matchMsg.style.color = "red";
    }
});
</script>

</body>
</html>
