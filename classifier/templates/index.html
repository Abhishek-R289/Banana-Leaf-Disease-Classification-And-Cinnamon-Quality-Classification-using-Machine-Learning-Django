<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #11998e, #38ef7d);
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🌿 ML Dashboard</span>

    <div>
        <!-- ✅ USERNAME -->
        <span class="text-white me-3">
            👤 {{ request.user.username }}
        </span>

        <!-- ✅ LOGOUT -->
    <form method="POST" action="/logout/" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm">Logout</button>
    </form>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <h3 class="text-center text-white mb-4">
        Welcome, {{ request.user.username }} 👋
    </h3>

    <div class="row">

        <!-- Banana -->
        <div class="col-md-6 mb-3">
            <div class="card text-center bg-light">
                <h4>🌱 Banana Leaf Classifier</h4>
                <p>Predict banana leaf health</p>
                <a href="/banana/" class="btn btn-success">Open</a>
            </div>
        </div>

        <!-- Cinnamon -->
        <div class="col-md-6 mb-3">
            <div class="card text-center bg-light">
                <h4>🌿 Cinnamon Quality</h4>
                <p>Predict cinnamon quality</p>
                <a href="/cinnamon/" class="btn btn-success">Open</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
