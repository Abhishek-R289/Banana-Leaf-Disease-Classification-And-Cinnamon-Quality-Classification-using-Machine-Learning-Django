<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banana Leaf Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #66816a, #a8e063);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .title {
            font-weight: bold;
            color: #2d3436;
        }
        .btn-custom {
            background-color: #2d3436;
            color: white;
            font-weight: bold;
        }
        .btn-custom:hover {
            background-color: #636e72;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 w-100" style="max-width: 550px;">
        
        <h3 class="text-center title mb-4">🌱 Banana Leaf Disease Classifier 🌱</h3>

        <!-- ERROR MESSAGE -->
        {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/predict/">
            {% csrf_token %}

            <!-- LENGTH -->
            <input type="number" step="any" class="form-control mb-2" name="length" placeholder="Leaf Length (cm)" required>

            <!-- WIDTH -->
            <input type="number" step="any" class="form-control mb-2" name="width" placeholder="Leaf Width (cm)" required>

            <!-- COLOR -->
            <select class="form-control mb-2" name="color" required>
                <option value="">Select Color Intensity</option>
                <option value="0">Dark</option>
                <option value="1">Light</option>
                <option value="2">Medium</option>
            </select>

            <!-- SPOTS -->
            <label><strong>Spots Present:</strong></label><br>
            <input type="radio" name="spots" value="1" required> Yes
            <input type="radio" name="spots" value="0"> No
            <br><br>

            <!-- MOISTURE -->
            <input type="number" step="any" class="form-control mb-2" name="moisture" placeholder="Moisture Level (%)" required>

            <!-- TEXTURE -->
            <select class="form-control mb-2" name="texture" required>
                <option value="">Select Texture</option>
                <option value="0">Rough</option>
                <option value="1">Smooth</option>
            </select>

            <!-- HUMIDITY -->
            <input type="number" step="any" class="form-control mb-2" name="humidity" placeholder="Humidity (%)" required>

            <!-- TEMP -->
            <input type="number" step="any" class="form-control mb-2" name="temp" placeholder="Temperature (°C)" required>

            <!-- SOIL -->
            <select class="form-control mb-3" name="soil" required>
                <option value="">Select Soil Type</option>
                <option value="0">Clay</option>
                <option value="1">Loamy</option>
                <option value="2">Sandy</option>
            </select>

            <!-- SUBMIT -->
            <button type="submit" class="btn btn-custom w-100">🔍 Predict</button>

        </form>

    </div>
</div>

</body>
</html>
